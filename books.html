<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Мої книги — Василь Овсієнко</title>

<style>
body {
    margin: 0;
    background: #0d0d0d;
    font-family: Arial;
    color: #fff;
}

header {
    background: #111;
    padding: 15px;
    text-align: center;
}

nav a {
    color: #ff6a00;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

.books {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 15px rgba(255,100,0,0.2);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.title {
    font-size: 18px;
    margin-top: 10px;
}

.price {
    color: #ff6a00;
    margin: 10px 0;
}

button {
    background: #ff6a00;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #ff8000;
}
</style>

</head>

<body>

<header>
<nav>
    <a href="index.html">Головна</a>
    <a href="books.html">Книги</a>
    <a href="author.html">Автор</a>
</nav>
</header>

<div class="container">

<h1>📚 Мої книги</h1>

<div class="books">

<!-- КНИГА 1 -->
<div class="card">
    <img src="cover.png">
    <div class="title">Тіні Дев’ятого Року</div>
    <div>Містичний хорор</div>
    <div class="price">50 / 100 грн</div>
    <a href="index.html">
        <button>Детальніше</button>
    </a>
</div>

<!-- КНИГА 2 -->
<div class="card">
    <img src="nevymykai.png">
    <div class="title">Не вимикай світло</div>
    <div>Психологічний жах</div>
    <div class="price">50 грн</div>
    <a href="nevymykai.html">
        <button>Детальніше</button>
    </a>
</div>

<!-- КНИГА 3 -->
<div class="card">
    <img src="lucy.png">
    <div class="title">Люсі та Наруто</div>
    <div>Переплетіння світів</div>
    <div class="price">50 грн</div>
    <a href="lucy.html">
        <button>Детальніше</button>
    </a>
</div>

</div>

</div>

</body>
</html>
